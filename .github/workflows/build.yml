name: build

on:
  schedule:
    - cron: "23 5 * * 1"   # weekly, Monday 05:23 UTC — ALWAYS rebuilds (see note)
  workflow_dispatch:
  push:
    branches: [main]
    # paths-ignore is scoped to `push` ONLY. GitHub never applies path filters to
    # `schedule`/`workflow_dispatch`, so the weekly cron (which pulls a fresh
    # myoung34 base + apt upgrade — the patch-delivery channel) and manual runs
    # ALWAYS build. Everything below is doc/meta that cannot change the produced
    # image or its scan/smoke gates, so a doc-only commit skips the matrix.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.idea/**'

# Top-level read-only; write scopes (packages/id-token) are granted per-job to
# only the jobs that push/sign — least privilege.
permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a partway-pushed run

env:
  IMAGE: ghcr.io/openserbia/github-runner

# Tooling (trivy, syft, cosign, go-task) comes from devbox.json via `devbox run`
# on the self-hosted runners — NOT from marketplace tool-wrapper actions
# (race-proof, nothing we don't control). Same philosophy as postgres-wolfi.
#
# Multi-arch:
#   - `build`    fans out over arches (amd64/arm64). Each leg builds NATIVELY on
#                a self-hosted runner of its arch — routed by GitHub's built-in
#                X64 / ARM64 labels — so no buildx/QEMU. It scans + smokes on that
#                real hardware, pushes a per-arch tag (:latest-<arch>, an
#                implementation-detail handoff), then signs/attests it BY DIGEST.
#                The scan/smoke gate the push, so a bad arch publishes nothing.
#   - `manifest` stitches the two per-arch images into the public :latest
#                multi-arch list and signs the index. There is no dated tag —
#                pin an immutable build by its @sha256 digest (cosign-signed).
jobs:
  build:
    permissions:
      contents: read       # checkout
      packages: write      # push per-arch tag to GHCR
      id-token: write      # cosign keyless OIDC
    strategy:
      fail-fast: false             # one arch failing must not abort the other
      matrix:
        arch: ["amd64", "arm64"]
        include:
          - arch: amd64
            runner: X64
          - arch: arm64
            runner: ARM64
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Native single-arch build: the runner's hardware arch == matrix.arch, so a
      # plain `docker build` already produces the correct arch (no buildx/QEMU).
      # The -<arch> tag is just the handoff to the manifest job. --pull always
      # refreshes the base (the weekly patch channel).
      - name: Build
        run: docker build --pull -t "$IMAGE:latest-$ARCH" .

      - name: Scan (CRITICAL gate) + SBOM + smoke
        run: devbox run -- task scan sbom smoke REF="$IMAGE:latest-$ARCH"

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ matrix.arch }}
          path: sbom.cdx.json
          retention-days: 1

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push (per-arch tag)
        run: docker push "$IMAGE:latest-$ARCH"

      - name: Sign + attest per-arch (by digest, via devbox cosign)
        run: |
          DIGEST=$(docker inspect --format '{{index .RepoDigests 0}}' "$IMAGE:latest-$ARCH")
          echo "signing $DIGEST"
          devbox run -- cosign sign --yes "$DIGEST"
          devbox run -- cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$DIGEST"

  manifest:
    # Runs only if BOTH build legs succeeded (default needs-gating) — so a broken
    # arch never yields a published multi-arch list.
    needs: build
    permissions:
      contents: write     # push the README image-size badge update
      packages: write      # push manifest list to GHCR
      id-token: write      # cosign sign index
    runs-on: [self-hosted, X64]
    steps:
      # Needed so devbox.json is present for `devbox run -- cosign` below — a
      # self-hosted runner does NOT guarantee the build job's workspace persists
      # to this job (it may run on a different runner of the pool).
      # persist-credentials: true keeps the token for the badge-update push below.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Assemble the per-arch images into the public :latest multi-arch list.
      - name: Create + push manifest list
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            "$IMAGE:latest-amd64" \
            "$IMAGE:latest-arm64"

      # Sign the index digest so `cosign verify :latest` (which resolves to the
      # index) passes. Per-arch children were already signed + SBOM-attested.
      - name: Sign manifest list (by digest, via devbox cosign)
        run: |
          DIGEST=$(docker buildx imagetools inspect "$IMAGE:latest" --format '{{.Manifest.Digest}}')
          echo "signing index $IMAGE@$DIGEST"
          devbox run -- cosign sign --yes "$IMAGE@$DIGEST"

      # Keep the README image-size badge current: the amd64 compressed size
      # (config + layers from its registry manifest), committed back with
      # [skip ci] so it doesn't re-trigger this workflow. Cosmetic — never fails
      # the build.
      - name: Update README image-size badge
        continue-on-error: true
        run: |
          # latest-amd64 is an OCI index (buildkit wraps single-platform images +
          # an attestation manifest), so resolve the amd64 image manifest first,
          # then sum its config + layer (compressed) sizes.
          digest=$(docker manifest inspect "$IMAGE:latest-amd64" \
            | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')
          bytes=$(docker manifest inspect "$IMAGE@$digest" | jq '[.config.size] + [.layers[].size] | add')
          human=$(awk -v b="$bytes" 'BEGIN{ m=b/1048576; if (m>=1024) printf "%.2f GiB", m/1024; else printf "%d MiB", m }')
          enc=${human/ /%20}
          sed -i -E "s#(badge/image%20size-)[^-]*(-2496ed)#\1${enc}\2#" README.md
          if git diff --quiet -- README.md; then echo "image size unchanged ($human)"; exit 0; fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "docs(readme): image-size badge -> ${human} [skip ci]"
          git push
